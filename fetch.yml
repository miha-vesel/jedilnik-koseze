name: Fetch Jedilnik

on:
  schedule:
    - cron: '0 5 * * 1-5'  # vsak delovnik ob 7:00 (UTC+2)
  workflow_dispatch:         # možnost ročnega zagona

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch jedilnik
        run: python3 fetch.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jedilnik.json
          git diff --cached --quiet || git commit -m "Posodobi jedilnik"
          git push
