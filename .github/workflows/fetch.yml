name: Fetch Jedilnik

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch jedilnik
        run: python3 fetch.py

      - name: Pokazi rezultat
        run: cat jedilnik.json

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jedilnik.json
          git diff --cached --quiet || git commit -m "Posodobi jedilnik $(date +%Y-%m-%d)"
          git push
